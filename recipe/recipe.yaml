schema_version: 1

context:
  version: 0.7.2
  python_min: 3.7

package:
  name: graphemeu
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphemeu/graphemeu-${{ version }}.tar.gz
  sha256: 42bbe373d7c146160f286cd5f76b1a8ad29172d7333ce10705c5cc282462a4f8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - grapheme
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Unicode grapheme helpers
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/timendum/grapheme
  documentation: https://graphemeu.readthedocs.io/

extra:
  recipe-maintainers:
    - Brainor
